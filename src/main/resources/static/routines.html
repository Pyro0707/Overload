<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routines — Overload</title>
    <meta name="description" content="Build and manage your workout routine templates.">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme.js"></script>
</head>
<body class="bg-[#f9f9f9] text-[#1b1b1b] min-h-screen font-['Hanken_Grotesk'] overflow-x-hidden">
    <!-- Main Content Canvas -->
    <main class="w-full md:w-[calc(100%-16rem)] md:ml-64 p-5 md:p-10 lg:p-12 min-h-screen">
        <div class="max-w-[1280px] mx-auto flex flex-col gap-8">
            <!-- Header Section -->
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 animate-fade-in-up">
                <div>
                    <h1 class="font-['Plus_Jakarta_Sans'] text-3xl md:text-4xl font-extrabold text-black tracking-tight">Routines</h1>
                    <p class="font-medium text-sm text-[#5d5f5d] mt-1">Build and customize your training splits</p>
                </div>
                <button onclick="showCreateRoutineModal()" class="bg-black text-white px-6 py-3.5 rounded-full font-semibold text-sm flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-sm">
                    <span class="material-symbols-outlined text-[18px]">add</span>
                    <span>New Routine</span>
                </button>
            </header>

            <!-- Routine List Container -->
            <div id="routine-list" class="flex flex-col gap-4 animate-fade-in-up animation-delay-100"></div>

            <!-- Routine Detail Container -->
            <div id="routine-detail" class="hidden flex flex-col gap-6 animate-fade-in-up"></div>
        </div>
    </main>

    <!-- Create Routine Modal -->
    <div class="modal-overlay" id="create-routine-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">New Routine</div>
                <button class="modal-close" type="button" onclick="closeModal('create-routine-modal')">&times;</button>
            </div>
            <form onsubmit="createRoutine(event)" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]">Routine Name</label>
                    <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3 px-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="routine-name-input" placeholder="e.g. PPL Split, Upper/Lower" required>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]">Initial Day Name</label>
                    <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3 px-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="day-name-input" placeholder="e.g. Push, Day A, Upper" required>
                </div>
                <div class="pt-3">
                    <button type="submit" class="w-full bg-black text-white font-semibold text-sm py-3.5 rounded-full hover:opacity-90 transition-all shadow-sm">Create Routine</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Exercise to Day Modal (Hevy-style Picker) -->
    <div class="modal-overlay" id="add-exercise-modal">
        <div class="modal" style="max-width: 480px; padding: 0; overflow: hidden;">
            <!-- Header -->
            <div style="padding: 24px 24px 0;">
                <div class="modal-header" style="margin-bottom: 16px;">
                    <div class="modal-title">Add Exercise</div>
                    <button class="modal-close" type="button" onclick="closeModal('add-exercise-modal')">&times;</button>
                </div>
                <!-- Search Bar -->
                <div style="position: relative; margin-bottom: 12px;">
                    <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text-muted);">search</span>
                    <input type="text" id="exercise-search" placeholder="Search exercises..." oninput="filterExerciseList()"
                        class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3 pl-10 pr-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white transition-all">
                </div>
                <!-- Muscle Group Filter Chips -->
                <div id="muscle-chips" class="flex gap-2 overflow-x-auto pb-3 hide-scrollbar" style="margin: 0 -24px; padding-left: 24px; padding-right: 24px;"></div>
            </div>

            <!-- Exercise List (scrollable) -->
            <div id="exercise-picker-list" style="max-height: 320px; overflow-y: auto; padding: 0 24px;"></div>

            <!-- Footer: Target Sets + Add Button -->
            <div style="padding: 16px 24px; border-top: 1px solid var(--border);">
                <div class="flex items-center gap-3 mb-3">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d] whitespace-nowrap">Target Sets</label>
                    <input class="flex-1 bg-[#f3f3f3] border border-transparent rounded-lg py-2 px-3 text-sm text-[#1b1b1b] text-center font-bold focus:ring-2 focus:ring-black focus:bg-white transition-all" id="target-sets-input" type="number" min="1" value="4" style="max-width: 70px;">
                </div>
                <button type="button" class="w-full bg-black text-white font-semibold text-sm py-3.5 rounded-full hover:opacity-90 transition-all shadow-sm" onclick="addExerciseToDay()">Add to Day</button>

                <!-- Create New Exercise (collapsible) -->
                <details class="mt-3">
                    <summary class="text-xs font-bold text-[#5d5f5d] uppercase tracking-wider cursor-pointer hover:text-black transition-colors py-2">+ Create new exercise</summary>
                    <div class="flex flex-col gap-2.5 pt-2">
                        <div class="grid grid-cols-2 gap-2.5">
                            <input class="bg-[#f3f3f3] border border-transparent rounded-xl py-2.5 px-3 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white" id="new-exercise-name" placeholder="Exercise name">
                            <input class="bg-[#f3f3f3] border border-transparent rounded-xl py-2.5 px-3 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white" id="new-exercise-muscle" placeholder="Muscle group">
                        </div>
                        <button type="button" class="w-full bg-[#f3f3f3] text-[#1b1b1b] font-semibold text-sm py-2.5 rounded-full hover:bg-black hover:text-white transition-all border border-[#eeeeee]" onclick="createAndAddExercise()">Create & Add</button>
                    </div>
                </details>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        requireAuth();

        let currentRoutine = null;
        let currentDay = null;
        let exercises = [];
        let dayExercises = [];

        (async () => {
            try {
                exercises = await API.get('/api/exercises');
                loadRoutines();
            } catch (err) {
                console.error('Failed to load initial routine data:', err);
            }
        })();

        async function loadRoutines() {
            const names = await API.get('/api/routines');
            const container = document.getElementById('routine-list');
            document.getElementById('routine-detail').classList.add('hidden');
            container.classList.remove('hidden');

            if (names.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl p-12 text-center border border-[#e2e2e2] flex flex-col items-center gap-3">
                        <div class="w-16 h-16 rounded-full bg-[#f3f3f3] flex items-center justify-center text-[#848484]">
                            <span class="material-symbols-outlined text-3xl">fitness_center</span>
                        </div>
                        <h3 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-black">No routines yet</h3>
                        <p class="text-sm text-[#5d5f5d] max-w-sm">Create your first workout routine to structure your training days and target exercises.</p>
                        <button onclick="showCreateRoutineModal()" class="mt-2 bg-black text-white px-6 py-3 rounded-full font-semibold text-sm hover:opacity-90 transition-opacity">+ New Routine</button>
                    </div>`;
                return;
            }

            container.innerHTML = names.map(name => `
                <div class="bg-white rounded-2xl p-6 border border-[#e2e2e2] hover:border-black transition-all cursor-pointer flex items-center justify-between group shadow-sm hover:shadow-md" onclick="openRoutine('${name.replace(/'/g, "\\'")}')">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-[#f3f3f3] group-hover:bg-black group-hover:text-white transition-colors flex items-center justify-center text-black flex-shrink-0">
                            <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
                        </div>
                        <div>
                            <h3 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-black group-hover:text-[#0d9488] transition-colors">${name}</h3>
                            <p class="text-xs text-[#5d5f5d]">Custom Training Split</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="w-9 h-9 rounded-full bg-[#f3f3f3] text-[#848484] hover:bg-red-50 hover:text-red-600 transition-colors flex items-center justify-center" onclick="event.stopPropagation(); deleteRoutine('${name.replace(/'/g, "\\'")}')" title="Delete Routine">
                            <span class="material-symbols-outlined text-[18px]">delete</span>
                        </button>
                        <div class="w-9 h-9 rounded-full bg-[#f3f3f3] group-hover:bg-black group-hover:text-white transition-colors flex items-center justify-center text-[#5d5f5d]">
                            <span class="material-symbols-outlined text-[20px]">chevron_right</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openRoutine(name) {
            currentRoutine = name;
            document.getElementById('routine-list').classList.add('hidden');
            const detail = document.getElementById('routine-detail');
            detail.classList.remove('hidden');

            const days = await API.get(`/api/routines/${encodeURIComponent(name)}`);

            let html = `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-6 rounded-2xl border border-[#e2e2e2] shadow-sm">
                    <div class="flex items-center gap-3">
                        <button onclick="backToList()" class="w-9 h-9 rounded-full bg-[#f3f3f3] hover:bg-black hover:text-white transition-colors flex items-center justify-center text-[#5d5f5d]" title="Back to list">
                            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                        </button>
                        <div>
                            <span class="text-xs font-semibold text-[#5d5f5d] uppercase tracking-wider">Routine Split</span>
                            <h2 class="font-['Plus_Jakarta_Sans'] text-2xl font-extrabold text-black">${name}</h2>
                        </div>
                    </div>
                    <button onclick="promptAddDay()" class="bg-[#f3f3f3] text-black hover:bg-black hover:text-white px-5 py-2.5 rounded-full font-semibold text-xs transition-colors flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-[16px]">add</span> Add Training Day
                    </button>
                </div>`;

            for (const [day, exs] of Object.entries(days)) {
                html += `
                    <div class="bg-white rounded-2xl p-6 border border-[#e2e2e2] shadow-sm flex flex-col gap-4">
                        <div class="flex items-center justify-between pb-3 border-b border-[#eeeeee]">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-black text-[22px]" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
                                <h3 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-black">${day}</h3>
                                <span class="px-2.5 py-0.5 rounded-full bg-[#f3f3f3] text-[#5d5f5d] text-xs font-semibold">${exs.length} exercises</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="openAddExercise('${day.replace(/'/g, "\\'")}')" class="bg-black text-white hover:opacity-90 px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[16px]">add</span> Exercise
                                </button>
                                <button onclick="deleteDay('${day.replace(/'/g, "\\'")}')" class="w-8 h-8 rounded-full bg-[#f3f3f3] text-[#848484] hover:bg-red-50 hover:text-red-600 transition-colors flex items-center justify-center" title="Delete Day">
                                    <span class="material-symbols-outlined text-[16px]">delete</span>
                                </button>
                            </div>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width: 48px;">#</th>
                                        <th>Exercise</th>
                                        <th>Muscle Group</th>
                                        <th>Target Sets</th>
                                        <th style="width: 60px; text-align: right;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${exs.length === 0 ? `
                                        <tr>
                                            <td colspan="5" class="text-center py-6 text-sm text-[#848484] font-medium">No exercises assigned to this day yet.</td>
                                        </tr>
                                    ` : exs.map((ex, i) => `
                                        <tr>
                                            <td class="font-bold text-xs text-[#848484]">${i + 1}</td>
                                             <td class="font-bold text-black">
                                                 <div class="flex items-center gap-3">
                                                     <div class="w-8 h-8 rounded-full bg-[#f3f3f3] border border-[#e2e2e2] flex items-center justify-center overflow-hidden flex-shrink-0 shadow-sm">
                                                         ${getExerciseIconSvg(ex.exerciseName, ex.muscleGroup)}
                                                     </div>
                                                     <span>${ex.exerciseName}</span>
                                                 </div>
                                             </td>
                                            <td><span class="px-2.5 py-1 rounded-md bg-[#f3f3f3] text-[#5d5f5d] text-xs font-semibold uppercase">${ex.muscleGroup || 'General'}</span></td>
                                            <td>
                                                <div class="inline-flex items-center gap-1.5 bg-[#f3f3f3] hover:bg-[#eaeaea] border border-[#e5e5e5] rounded-xl px-2 py-1 transition-all">
                                                    <button type="button" onclick="updateExerciseSets('${day.replace(/'/g, "\\'")}', '${ex.exerciseId}', ${(ex.targetSets || 4) - 1})" class="w-6 h-6 rounded-lg hover:bg-black hover:text-white text-[#5d5f5d] flex items-center justify-center font-bold text-sm transition-colors" title="Decrease sets">-</button>
                                                    <input type="number" min="1" max="50" value="${ex.targetSets || 4}" 
                                                           class="w-10 bg-transparent border-none p-0 text-xs font-bold text-black focus:ring-0 text-center"
                                                           onchange="updateExerciseSets('${day.replace(/'/g, "\\'")}', '${ex.exerciseId}', this.value)"
                                                           title="Target sets">
                                                    <span class="text-xs font-semibold text-[#5d5f5d] select-none mr-0.5">sets</span>
                                                    <button type="button" onclick="updateExerciseSets('${day.replace(/'/g, "\\'")}', '${ex.exerciseId}', ${(ex.targetSets || 4) + 1})" class="w-6 h-6 rounded-lg hover:bg-black hover:text-white text-[#5d5f5d] flex items-center justify-center font-bold text-sm transition-colors" title="Increase sets">+</button>
                                                </div>
                                            </td>
                                            <td class="text-right">
                                                <button class="w-8 h-8 rounded-full text-[#848484] hover:bg-red-50 hover:text-red-600 inline-flex items-center justify-center transition-colors" onclick="removeExerciseFromDay('${day.replace(/'/g, "\\'")}', '${ex.exerciseId}')" title="Remove">
                                                    <span class="material-symbols-outlined text-[16px]">close</span>
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }
            detail.innerHTML = html;
        }

        function backToList() {
            currentRoutine = null;
            document.getElementById('routine-detail').classList.add('hidden');
            document.getElementById('routine-list').classList.remove('hidden');
        }

        function showCreateRoutineModal() {
            document.getElementById('routine-name-input').value = '';
            document.getElementById('day-name-input').value = '';
            document.getElementById('create-routine-modal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function createRoutine(e) {
            e.preventDefault();
            const routineName = document.getElementById('routine-name-input').value.trim();
            const dayName = document.getElementById('day-name-input').value.trim();
            try {
                await API.post('/api/routines', { routineName, dayName });
                closeModal('create-routine-modal');
                showToast('Routine created!', 'success');
                await loadRoutines();
            } catch (err) {
                showToast(err.message || 'Creation failed', 'error');
            }
        }

        async function deleteRoutine(name) {
            if (!confirm(`Delete routine "${name}"?`)) return;
            try {
                await API.delete(`/api/routines/${encodeURIComponent(name)}`);
                showToast('Routine deleted', 'info');
                await loadRoutines();
            } catch (err) {
                showToast(err.message || 'Delete failed', 'error');
            }
        }

        async function promptAddDay() {
            const dayName = prompt('Enter new day name (e.g. Pull, Day B):');
            if (!dayName || !dayName.trim()) return;
            try {
                await API.post('/api/routines', { routineName: currentRoutine, dayName: dayName.trim() });
                showToast('Day added!', 'success');
                await openRoutine(currentRoutine);
            } catch (err) {
                showToast(err.message || 'Add day failed', 'error');
            }
        }

        async function deleteDay(dayName) {
            if (!confirm(`Delete day "${dayName}"?`)) return;
            try {
                await API.delete(`/api/routines/${encodeURIComponent(currentRoutine)}/days/${encodeURIComponent(dayName)}`);
                showToast('Day deleted', 'info');
                await openRoutine(currentRoutine);
            } catch (err) {
                showToast(err.message || 'Delete failed', 'error');
            }
        }

        let selectedExerciseId = null;
        let activeFilter = 'All';

        async function openAddExercise(dayName) {
            currentDay = dayName;
            selectedExerciseId = null;
            activeFilter = 'All';
            exercises = await API.get('/api/exercises');
            document.getElementById('exercise-search').value = '';
            renderMuscleChips();
            renderExerciseList();
            document.getElementById('add-exercise-modal').classList.add('active');
            setTimeout(() => document.getElementById('exercise-search').focus(), 100);
        }

        function renderMuscleChips() {
            const groups = [...new Set(exercises.map(e => e.muscleGroup || 'General'))].sort();
            const container = document.getElementById('muscle-chips');
            container.innerHTML = ['All', ...groups].map(g =>
                `<button onclick="setMuscleFilter('${g}')" class="whitespace-nowrap px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all ${activeFilter === g ? 'bg-black text-white shadow-sm' : 'bg-[#f3f3f3] text-[#5d5f5d] hover:bg-[#e8e8e8] border border-[#eeeeee]'}">${g}</button>`
            ).join('');
        }

        function setMuscleFilter(group) {
            activeFilter = group;
            renderMuscleChips();
            renderExerciseList();
        }

        function filterExerciseList() { renderExerciseList(); }

        function renderExerciseList() {
            const query = (document.getElementById('exercise-search').value || '').toLowerCase();
            const container = document.getElementById('exercise-picker-list');
            let filtered = exercises.filter(e => {
                const matchSearch = e.name.toLowerCase().includes(query) || (e.muscleGroup || '').toLowerCase().includes(query);
                const matchFilter = activeFilter === 'All' || (e.muscleGroup || 'General') === activeFilter;
                return matchSearch && matchFilter;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="py-8 text-center text-sm text-[#848484]">No exercises found</div>';
                return;
            }

            // Group by muscle
            const groups = {};
            filtered.forEach(e => {
                const g = e.muscleGroup || 'General';
                if (!groups[g]) groups[g] = [];
                groups[g].push(e);
            });

            let html = '';
            Object.keys(groups).sort().forEach(group => {
                html += `<div class="text-[10px] font-bold uppercase tracking-wider text-[#848484] pt-4 pb-1.5 sticky top-0 bg-white" style="background: var(--bg-surface);">${group}</div>`;
                groups[group].sort((a,b) => a.name.localeCompare(b.name)).forEach(e => {
                    const isSelected = selectedExerciseId == e.id;
                    html += `<button onclick="selectExercise(${e.id})" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-left transition-all ${isSelected ? 'bg-black text-white' : 'hover:bg-[#f3f3f3]'}" style="margin-bottom: 2px;">
                        <span class="material-symbols-outlined text-[18px] ${isSelected ? 'text-white' : 'text-[#848484]'}" style="font-variation-settings: 'FILL' ${isSelected ? 1 : 0};">fitness_center</span>
                        <span class="flex-1 text-sm font-semibold">${e.name}</span>
                        ${isSelected ? '<span class="material-symbols-outlined text-[18px]">check</span>' : ''}
                    </button>`;
                });
            });
            container.innerHTML = html;
        }

        function selectExercise(id) {
            selectedExerciseId = selectedExerciseId == id ? null : id;
            renderExerciseList();
        }

        async function addExerciseToDay() {
            if (!selectedExerciseId) { showToast('Select an exercise first', 'error'); return; }
            const targetSets = parseInt(document.getElementById('target-sets-input').value) || 4;
            try {
                await API.post(`/api/routines/${encodeURIComponent(currentRoutine)}/days/${encodeURIComponent(currentDay)}/exercises`, {
                    exerciseId: selectedExerciseId, targetSets
                });
                closeModal('add-exercise-modal');
                showToast('Exercise added!', 'success');
                await openRoutine(currentRoutine);
            } catch (err) {
                showToast(err.message || 'Add failed', 'error');
            }
        }

        async function removeExerciseFromDay(dayName, exerciseId) {
            try {
                await API.delete(`/api/routines/${encodeURIComponent(currentRoutine)}/days/${encodeURIComponent(dayName)}/exercises/${exerciseId}`);
                showToast('Exercise removed', 'info');
                await openRoutine(currentRoutine);
            } catch (err) {
                showToast(err.message || 'Remove failed', 'error');
            }
        }

        async function updateExerciseSets(dayName, exerciseId, newSets) {
            const sets = parseInt(newSets, 10);
            if (isNaN(sets) || sets < 1) {
                showToast('Target sets must be at least 1', 'error');
                await openRoutine(currentRoutine);
                return;
            }
            try {
                await API.patch(`/api/routines/${encodeURIComponent(currentRoutine)}/days/${encodeURIComponent(dayName)}/exercises/${exerciseId}`, {
                    targetSets: sets
                });
                showToast(`Target sets updated to ${sets}!`, 'success');
                await openRoutine(currentRoutine);
            } catch (err) {
                showToast(err.message || 'Failed to update sets', 'error');
                await openRoutine(currentRoutine);
            }
        }

        async function createAndAddExercise() {
            const name = document.getElementById('new-exercise-name').value.trim();
            const muscleGroup = document.getElementById('new-exercise-muscle').value.trim() || 'General';
            if (!name) { showToast('Enter exercise name', 'error'); return; }
            try {
                const ex = await API.post('/api/exercises', { name, muscleGroup });
                const targetSets = parseInt(document.getElementById('target-sets-input').value) || 4;
                await API.post(`/api/routines/${encodeURIComponent(currentRoutine)}/days/${encodeURIComponent(currentDay)}/exercises`, {
                    exerciseId: ex.id, targetSets
                });
                closeModal('add-exercise-modal');
                document.getElementById('new-exercise-name').value = '';
                document.getElementById('new-exercise-muscle').value = '';
                showToast(`Created & added ${name}!`, 'success');
                await openRoutine(currentRoutine);
            } catch (err) {
                showToast(err.message || 'Creation failed', 'error');
            }
        }
    </script>
</body>
</html>
