<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overload — Login</title>
    <meta name="description" content="Log in to Overload to track your workouts and progressive overload.">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Custom Style & Fonts -->
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="min-h-screen flex items-center justify-center p-5 font-['Hanken_Grotesk'] text-[#1b1b1b] antialiased bg-[#f9f9f9]">
    <main class="w-full max-w-md animate-fade-in-up">
        <div class="bg-white rounded-2xl ambient-shadow p-8 flex flex-col gap-8 border border-[#e2e2e2]">
            <!-- Logo & Header -->
            <div class="flex flex-col items-center gap-4 text-center">
                <div class="w-12 h-12 bg-black rounded-full flex items-center justify-center shadow-sm">
                    <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
                </div>
                <div>
                    <h1 class="font-['Plus_Jakarta_Sans'] text-3xl font-extrabold text-black tracking-tight">Overload</h1>
                    <p class="font-['Hanken_Grotesk'] text-sm text-[#5d5f5d] mt-1">Premium Performance Tracking</p>
                </div>
            </div>

            <!-- Tab Switcher -->
            <div id="tab-switcher" class="flex p-1 bg-[#f3f3f3] rounded-xl border border-[#eeeeee]">
                <button type="button" id="tab-login" onclick="showTab('login')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-black text-white shadow-sm">Sign In</button>
                <button type="button" id="tab-register" onclick="showTab('register')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-[#5d5f5d] hover:text-black">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]" for="login-username">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#848484] text-[20px]">person</span>
                        </span>
                        <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3.5 pl-12 pr-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="login-username" type="text" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]" for="login-password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#848484] text-[20px]">lock</span>
                        </span>
                        <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3.5 pl-12 pr-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="login-password" type="password" placeholder="Enter password" required>
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-black text-white font-semibold text-sm py-4 rounded-full hover:opacity-90 active:scale-[0.97] transition-transform duration-160 flex justify-center items-center gap-2 shadow-md">
                        <span>Sign In</span>
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                    </button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" class="hidden flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]" for="reg-username">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#848484] text-[20px]">person</span>
                        </span>
                        <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3.5 pl-12 pr-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="reg-username" type="text" placeholder="Choose a username (min 3 chars)" required minlength="3">
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]" for="reg-email">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#848484] text-[20px]">mail</span>
                        </span>
                        <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3.5 pl-12 pr-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="reg-email" type="email" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]" for="reg-password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#848484] text-[20px]">lock</span>
                        </span>
                        <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3.5 pl-12 pr-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="reg-password" type="password" placeholder="At least 8 characters" required minlength="8">
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider text-[#5d5f5d]" for="reg-confirm-password">Confirm Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#848484] text-[20px]">lock_reset</span>
                        </span>
                        <input class="w-full bg-[#f3f3f3] border border-transparent rounded-xl py-3.5 pl-12 pr-4 text-sm text-[#1b1b1b] placeholder:text-[#848484] focus:ring-2 focus:ring-black focus:bg-white focus:border-[#e2e2e2] transition-all" id="reg-confirm-password" type="password" placeholder="Re-enter password" required minlength="8">
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-black text-white font-semibold text-sm py-4 rounded-full hover:opacity-90 active:scale-[0.97] transition-transform duration-160 flex justify-center items-center gap-2 shadow-md">
                        <span>Register</span>
                        <span class="material-symbols-outlined text-[18px]">person_add</span>
                    </button>
                </div>
            </form>
            <!-- Social Logins (Google OAuth2) -->
            <div id="oauth-container" class="flex flex-col gap-4">
                <div class="relative flex items-center justify-center my-1">
                    <hr class="w-full border-t border-[#eeeeee]">
                    <span class="absolute px-3 bg-white text-xs font-semibold text-[#848484] uppercase tracking-wider">or continue with</span>
                </div>
                <a href="/oauth2/authorization/google" class="w-full flex items-center justify-center gap-3 bg-white border border-[#e2e2e2] rounded-full py-3.5 hover:bg-[#fcfcfc] active:scale-[0.97] transition-transform duration-160 shadow-sm text-sm font-semibold text-black">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Sign in with Google</span>
                </a>
            </div>

            <!-- Footer -->
            <div class="text-center pt-4 border-t border-[#eeeeee]">
                <p class="text-xs text-[#848484] font-medium">Built for progressive overload 🏋️</p>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        // ── Google OAuth Token Redirect Check ────────────────────────
        // Token arrives in the URL fragment (never sent to the server).
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const token = hashParams.get('token');
        const username = hashParams.get('username');
        const error = new URLSearchParams(window.location.search).get('error');

        if (token && username) {
            localStorage.setItem('token', token);
            localStorage.setItem('username', username);
            window.history.replaceState({}, document.title, window.location.pathname);
            window.location.href = '/dashboard.html';
        }

        if (error) {
            if (error === 'no_email_provided') {
                showToast('Google login failed: no email provided by Google.', 'error');
            } else {
                showToast('Google login failed.', 'error');
            }
            // Clear URL params
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        if (isLoggedIn()) window.location.href = '/dashboard.html';

        function showTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const regBtn = document.getElementById('tab-register');
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const oauthContainer = document.getElementById('oauth-container');

            if (tab === 'login') {
                loginBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-black text-white shadow-sm';
                regBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-[#5d5f5d] hover:text-black';
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
                oauthContainer.classList.remove('hidden');
            } else {
                regBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-black text-white shadow-sm';
                loginBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-[#5d5f5d] hover:text-black';
                regForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                oauthContainer.classList.add('hidden'); // Hide social login on registration tab
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            try {
                const data = await API.post('/auth/login', {
                    username: document.getElementById('login-username').value,
                    password: document.getElementById('login-password').value,
                });
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/dashboard.html';
            } catch (err) {
                showToast(err.message || 'Login failed', 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            try {
                const data = await API.post('/auth/register', {
                    username,
                    email,
                    password,
                    confirmPassword
                });
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/dashboard.html';
            } catch (err) {
                showToast(err.message || 'Registration failed', 'error');
            }
        }
    </script>
</body>
</html>
