<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History — Overload</title>
    <meta name="description" content="View your past workout sessions and filter by exercise or date.">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme.js"></script>
</head>
<body class="bg-[#f9f9f9] text-[#1b1b1b] min-h-screen font-['Hanken_Grotesk'] overflow-x-hidden">
    <!-- Main Content Canvas -->
    <main class="w-full md:w-[calc(100%-16rem)] md:ml-64 p-5 md:p-10 lg:p-12 min-h-screen">
        <div class="max-w-[1280px] mx-auto flex flex-col gap-8">
            <!-- Header Section -->
            <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 animate-fade-in-up">
                <div>
                    <h1 class="font-['Plus_Jakarta_Sans'] text-3xl md:text-4xl font-extrabold text-black tracking-tight">Workout History</h1>
                    <p class="font-medium text-sm text-[#5d5f5d] mt-1">Review your past performance, volume, and personal records.</p>
                </div>

                <!-- Filters -->
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto bg-white p-3 rounded-2xl border border-[#e2e2e2] shadow-sm">
                    <div class="flex items-center gap-2 flex-grow sm:flex-grow-0">
                        <input class="bg-[#f3f3f3] border border-transparent rounded-xl py-2 px-3 text-xs font-semibold text-black focus:ring-2 focus:ring-black focus:bg-white" type="date" id="filter-from" title="From date">
                        <span class="text-xs text-[#848484] font-bold">to</span>
                        <input class="bg-[#f3f3f3] border border-transparent rounded-xl py-2 px-3 text-xs font-semibold text-black focus:ring-2 focus:ring-black focus:bg-white" type="date" id="filter-to" title="To date">
                    </div>
                    <select class="bg-[#f3f3f3] border border-transparent rounded-xl py-2 px-3 text-xs font-semibold text-black focus:ring-2 focus:ring-black focus:bg-white cursor-pointer" id="filter-exercise">
                        <option value="">All Exercises</option>
                    </select>
                    <button onclick="applyFilters()" class="bg-black text-white hover:opacity-90 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1 shadow-sm">
                        <span class="material-symbols-outlined text-[16px]">filter_list</span> Filter
                    </button>
                </div>
            </header>

            <!-- Session Stack Container -->
            <div id="session-list" class="flex flex-col gap-4 animate-fade-in-up animation-delay-100 pb-16"></div>
        </div>
    </main>

    <!-- Session Detail Modal -->
    <div class="modal-overlay" id="session-modal">
        <div class="modal" style="max-width: 620px;">
            <div class="modal-header">
                <div class="modal-title font-['Plus_Jakarta_Sans'] text-xl font-bold" id="session-modal-title"></div>
                <button class="modal-close" type="button" onclick="closeModal()">&times;</button>
            </div>
            <div id="session-modal-body" class="flex flex-col gap-6"></div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        requireAuth();

        let sessions = [];
        let exercises = [];

        (async () => {
            try {
                [sessions, exercises] = await Promise.all([
                    API.get('/api/sessions'),
                    API.get('/api/exercises')
                ]);

                const select = document.getElementById('filter-exercise');
                exercises.forEach(e => {
                    select.innerHTML += `<option value="${e.id}">${e.name}</option>`;
                });

                renderSessions(sessions);
            } catch (err) {
                console.error('Failed to load history data:', err);
            }
        })();

        function renderSessions(list) {
            const container = document.getElementById('session-list');

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl p-12 text-center border border-[#e2e2e2] flex flex-col items-center gap-3">
                        <div class="w-16 h-16 rounded-full bg-[#f3f3f3] flex items-center justify-center text-[#848484]">
                            <span class="material-symbols-outlined text-3xl">history_toggle_off</span>
                        </div>
                        <h3 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-black">No sessions found</h3>
                        <p class="text-sm text-[#5d5f5d] max-w-sm">No recorded workouts match your filters, or you haven't completed a training session yet.</p>
                    </div>`;
                return;
            }

            // Group by month
            const grouped = {};
            list.forEach(s => {
                const d = new Date(s.date);
                const key = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(s);
            });

            container.innerHTML = Object.entries(grouped).map(([month, items]) => `
                <div class="flex flex-col gap-3">
                    <h3 class="text-xs font-extrabold uppercase tracking-widest text-[#848484] mt-4 px-2">${month}</h3>
                    ${items.map(s => {
                        const totalSets = s.sets ? s.sets.length : 0;
                        const totalVol = s.sets ? s.sets.reduce((sum, st) => sum + (st.weight * st.reps), 0) : 0;
                        const prs = s.sets ? s.sets.filter(st => st.isPr || st.weightPr || st.repPr).length : 0;

                        return `
                        <div class="bg-white rounded-2xl p-6 border border-[#e2e2e2] hover:border-black transition-all duration-300 relative overflow-hidden group shadow-sm hover:shadow-md cursor-pointer" onclick="openSessionDetail('${s.id}')">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-black opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                                <div class="flex items-start gap-4">
                                    <div class="w-12 h-12 rounded-full bg-[#f3f3f3] group-hover:bg-black group-hover:text-white transition-colors flex items-center justify-center text-black flex-shrink-0 mt-0.5">
                                        <span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
                                    </div>
                                    <div>
                                        <div class="flex items-center gap-2 mb-1">
                                            <h4 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-black group-hover:text-[#0d9488] transition-colors">${s.routineName || 'Freestyle Workout'}</h4>
                                            ${s.dayOfWeek ? `<span class="px-2.5 py-0.5 rounded-full bg-[#f3f3f3] text-[#5d5f5d] text-xs font-semibold">${s.dayOfWeek}</span>` : ''}
                                            <span class="text-xs font-bold text-[#848484] ml-1">${new Date(s.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
                                        </div>
                                        <p class="text-xs text-[#5d5f5d] line-clamp-1">${s.notes || 'No session notes recorded'}</p>
                                    </div>
                                </div>

                                <div class="flex flex-wrap sm:flex-nowrap items-center gap-4 sm:gap-6 bg-[#f3f3f3]/70 lg:bg-transparent p-3.5 lg:p-0 rounded-xl lg:rounded-none">
                                    <div class="flex flex-col">
                                        <span class="text-[10px] font-bold text-[#848484] uppercase tracking-wider">Total Volume</span>
                                        <span class="font-['Plus_Jakarta_Sans'] font-extrabold text-base text-black">${totalVol.toLocaleString()} <span class="text-xs font-normal text-[#5d5f5d]">kg</span></span>
                                    </div>
                                    <div class="w-px h-8 bg-[#e2e2e2] hidden sm:block"></div>
                                    <div class="flex flex-col">
                                        <span class="text-[10px] font-bold text-[#848484] uppercase tracking-wider">Completed Sets</span>
                                        <span class="font-['Plus_Jakarta_Sans'] font-extrabold text-base text-black">${totalSets} <span class="text-xs font-normal text-[#5d5f5d]">sets</span></span>
                                    </div>
                                    ${prs > 0 ? `
                                    <div class="w-px h-8 bg-[#e2e2e2] hidden sm:block"></div>
                                    <div class="flex flex-col">
                                        <span class="text-[10px] font-bold text-[#848484] uppercase tracking-wider">Records</span>
                                        <span class="font-['Plus_Jakarta_Sans'] font-extrabold text-base text-[#ea580c] flex items-center gap-1">${prs} <span class="material-symbols-outlined text-sm">emoji_events</span></span>
                                    </div>` : ''}
                                    <div class="ml-auto lg:ml-2">
                                        <div class="w-9 h-9 rounded-full bg-white lg:bg-[#f3f3f3] group-hover:bg-black group-hover:text-white transition-colors flex items-center justify-center text-[#5d5f5d] shadow-sm lg:shadow-none">
                                            <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            `).join('');
        }

        async function openSessionDetail(id) {
            try {
                const s = await API.get(`/api/sessions/${id}`);
                const title = document.getElementById('session-modal-title');
                const body = document.getElementById('session-modal-body');

                title.innerHTML = `${s.routineName || 'Freestyle'} <span class="text-sm font-normal text-[#5d5f5d] ml-2">${new Date(s.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</span>`;

                // Group sets by exercise
                const byEx = {};
                if (s.sets) {
                    for (const set of s.sets) {
                        if (!byEx[set.exerciseName]) byEx[set.exerciseName] = [];
                        byEx[set.exerciseName].push(set);
                    }
                }

                if (Object.keys(byEx).length === 0) {
                    body.innerHTML = '<p class="text-sm text-[#848484] text-center py-6">No set data recorded in this session.</p>';
                } else {
                    body.innerHTML = Object.entries(byEx).map(([exName, sets]) => `
                        <div class="bg-[#f9f9f9] p-5 rounded-2xl border border-[#e2e2e2] flex flex-col gap-3">
                            <h4 class="font-['Plus_Jakarta_Sans'] font-bold text-base text-black flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-black"></span>
                                <span>${exName}</span>
                            </h4>
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th>Set</th><th>Weight</th><th>Reps</th><th>Est. 1RM</th><th>Record</th></tr></thead>
                                    <tbody>
                                        ${sets.map(st => `
                                            <tr>
                                                <td class="font-bold text-xs text-[#848484]">${st.setNumber}</td>
                                                <td class="font-bold text-black">${st.weight} kg</td>
                                                <td class="font-bold text-black">${st.reps} reps</td>
                                                <td class="text-xs text-[#5d5f5d]">${Math.round(st.weight * (1 + st.reps / 30))} kg</td>
                                                <td>${st.isPr ? '<span class="bg-[#000000] text-white px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider">🏆 PR</span>' : '—'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `).join('');
                }

                body.innerHTML += `
                    <div class="flex justify-end pt-2 border-t border-[#eeeeee]">
                        <button class="bg-[#dc2626]/10 text-[#dc2626] hover:bg-[#dc2626] hover:text-white px-5 py-2.5 rounded-full text-xs font-bold transition-colors flex items-center gap-1.5" onclick="deleteSession('${s.id}')">
                            <span class="material-symbols-outlined text-[16px]">delete</span> Delete Session
                        </button>
                    </div>`;

                document.getElementById('session-modal').classList.add('active');
            } catch (err) {
                showToast('Failed to load session details', 'error');
            }
        }

        function closeModal() {
            document.getElementById('session-modal').classList.remove('active');
        }

        async function deleteSession(id) {
            if (!confirm('Permanently delete this workout session and all recorded sets?')) return;
            try {
                await API.delete(`/api/sessions/${id}`);
                closeModal();
                showToast('Session deleted', 'info');
                sessions = sessions.filter(s => s.id !== id);
                renderSessions(sessions);
            } catch (err) {
                showToast(err.message || 'Delete failed', 'error');
            }
        }

        function applyFilters() {
            const from = document.getElementById('filter-from').value;
            const to = document.getElementById('filter-to').value;
            const exId = document.getElementById('filter-exercise').value;

            let filtered = [...sessions];
            if (from) filtered = filtered.filter(s => s.date >= from);
            if (to) filtered = filtered.filter(s => s.date <= to);
            if (exId) {
                filtered = filtered.filter(s => s.sets && s.sets.some(st => st.exerciseId == exId));
            }
            renderSessions(filtered);
        }
    </script>
</body>
</html>
